# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: 'ja-JP'
early_access: false
reviews:
  profile: 'chill'
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  path_filters:
    - '!node_modules/**'
    - '!dist/**'
    - '!**/*.lock'
    - '!pnpm-lock.yaml'
    - '!flake.lock'
    - '!.expo/**'
  path_instructions:
    - path: 'src/widget/**'
      instructions: |
        - `react-native-android-widget` の制約を優先し、通常の React Native style がそのまま使えると仮定しないでください。
        - Widget のサイズ依存処理は `widgetWidth` / `widgetHeight` を使い、固定値だけに頼らないようにしてください。
        - Widget のクリック導線は deep link または `OPEN_APP` の既存パターンを維持してください。
    - path: 'src/db/**'
      instructions: |
        - DB schema と接続は `src/db/` を入口にしてください。
        - `expo-sqlite` のバージョン固有APIは公式シグネチャに合わせ、オプション引数を推測で渡さないでください。
    - path: 'src/lib/notifications/**'
      instructions: |
        - 通知スケジュール変更は `src/lib/notifications/` と reminder service の境界を守ってください。
        - Android notification channel、音の有無、権限状態の扱いを壊さないでください。
    - path: 'src/app/**'
      instructions: |
        - Expo Router のアプリエントリ、画面遷移、deep link の受け口です。deep link の変更時は `src/app-tests/` のテストも更新されているか確認してください。
instructions: |
  あなたは優秀なコードレビュアーです。以下のプロジェクト全体の指示に従ってレビューを行ってください：
  - 既存の構成、命名、テスト方式、UI表現を優先してください。
  - TypeScript strict mode を前提にし、型エラーや lint を設定緩和で回避しないでください。
  - 公開境界、repository/service、hook、widget props では明示的な型を優先してください。`any` は避けてください。
  - 日付や時間の扱いは既存の `date-fns` とプロジェクト内ユーティリティに寄せてください。
  - 永続化と副作用は UI コンポーネントへ直接混ぜず、既存の service/repository/hook 境界を使ってください。
